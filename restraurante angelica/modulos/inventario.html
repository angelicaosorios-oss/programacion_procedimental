<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/usuarios.css">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<section class="section">
  <div class="container">
    <h1 class="title has-text-centered">formulario de inventario</h1>
  </div>
</section>

<div class="field">
  <label class="label">Name</label>
  <div class="control">
    <input class="input" type="text" placeholder="Text input">
  </div>
</div>



<div class="field">
  <label class="label">usuarios</label>
  <div class="control has-icons-left has-icons-right">
    <input id="usuarios" class="input is-success" type="text" placeholder="usuarios" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">codigo_producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="codigo_producto" class="input is-danger" type="codigo_producto" placeholder="codigo_producto" value="codigo_producto">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
  <p class="help is-danger"></p>
</div>

<div class="field">
  <label class="label">nombre_producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="nombre_producto" class="input is-success" type="text" placeholder="nombre del producto" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">precio_unitario</label>
  <div class="control has-icons-left has-icons-right">
    <input id="precio_unitario" class="input is-success" type="text" placeholder="precio_unitario " value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">cantidad_producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="cantidad_producto" class="input is-success" type="text" placeholder="cantidad del producto" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">marca_producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="marca_producto" class="input is-success" type="text" placeholder="marca_producto" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">categoria_producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="cantidad_producto" class="input is-success" type="text" placeholder="categoria del producto" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">unidad_medida</label>
  <div class="control has-icons-left has-icons-right">
    <input id="unidad_medida" class="input is-success" type="text" placeholder="unidad de medida" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="select is-multiple">
  <select multiple size="8">
    <option value="codigo_producto">codigo_producto</option>
    <option value="nombre_completo">nombre_completo</option>
    <option value="precio_unitario">precio_unitario</option>
    <option value="cantidad_producto">cantidad_producto</option>
    <option value="marca_producto">marca_producto</option>
    <option value="categoria_producto">categoria_producto</option>
    <option value="unidad_medida">unidad_medida</option>
  </select>
</div>

<div class="field is-grouped">
  <div class="control">
    <button class="button is-link">guardar</button>
  </div>
  <div class="control">
    <a class="button is-link is-light" type="button" href="../index.html">volver al inicio</a>
  </div>
</div>
<script src="../js/inventario.js"></script>
</body>
</html>
