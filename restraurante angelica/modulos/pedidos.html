<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="/css/usuarios.css">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<section class="section">
  <div class="container">
    <h1 class="title has-text-centered">formulario de pedidos</h1>
  </div>
</section>


<div class="field">
  <label class="label">usuarios</label>
  <div class="control has-icons-left has-icons-right">
    <input id="usuarios" class="input is-success" type="text" placeholder="usuarios" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">producto</label>
  <div class="control has-icons-left has-icons-right">
    <input id="producto" class="input is-danger" type="producto" placeholder="producto" value="producto">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
  <p class="help is-danger"></p>
</div>

<div class="field">
  <label class="label">direccion</label>
  <div class="control has-icons-left has-icons-right">
    <input id="direccion" class="input is-success" type="text" placeholder="tu direccion" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">nombre del usuario</label>
  <div class="control has-icons-left has-icons-right">
    <input id="nombre del usuario" class="input is-success" type="text" placeholder="nombre del usuario" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">cantidad</label>
  <div class="control has-icons-left has-icons-right">
    <input id="cantidad" class="input is-success" type="text" placeholder="cantidad" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">metodo de pago</label>
  <div class="control has-icons-left has-icons-right">
    <input id="metodo de pago" class="input is-success" type="text" placeholder="metodo de pago" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">telefono</label>
  <div class="control has-icons-left has-icons-right">
    <input id="telefono" class="input is-success" type="text" placeholder="tu telefono" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="select is-multiple">
  <select multiple size="8">
    <option value="producto">producto</option>
    <option value="direccion">direccion</option>
    <option value="nombre del usuario">nombre del usuario</option>
    <option value="cantidad">cantidad</option>
    <option value="metodo de pago">metodo de pago</option>
    <option value="telefono">telefono</option>
  </select>
</div>

<div class="field is-grouped">
  <div class="control">
    <button class="button is-link">guardar</button>
  </div>
  <div class="control">
    <a class="button is-link is-light" type="button" href="../index.html">volver al inicio</a>
  </div>
</div>
<script src="../js/pedidos.js"></script>
</body>
</html>
