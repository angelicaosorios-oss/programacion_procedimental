<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="/css/usuarios.css" />
    <meta
      name="viewport"
      content="width=
    , initial-scale=1.0"
    />
    <title>Document</title>
  </head>
  <body>
    <section class="section">
      <div class="container">
        <h1 class="title has-text-centered">formulario de contabilidad</h1>
      </div>
    </section>

    <div class="field">
      <label class="label">Name</label>
      <div class="control">
        <input id="nombre" class="input" type="text" placeholder="Text input" />
      </div>
    </div>

    <div class="field">
      <label class="label">usuarios</label>
      <div class="control has-icons-left has-icons-right">
        <input id="usuarios"
          class="input is-success"
          type="text"
          placeholder="usuarios"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="field">
      <label class="label">ventas</label>
      <div class="control has-icons-left has-icons-right">
        <input id="ventas"
          class="input is-danger"
          type="ventas"
          placeholder="ventas"
          value="ventas"
        />
        <span class="icon is-small is-left">
          <i class="fas fa-envelope"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-exclamation-triangle"></i>
        </span>
      </div>
      <p class="help is-danger"></p>
    </div>

    <div class="field">
      <label class="label">fecha</label>
      <div class="control has-icons-left has-icons-right">
        <input id="fecha"
          class="input is-success"
          type="text"
          placeholder="fecha"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="field">
      <label class="label">ingresos</label>
      <div class="control has-icons-left has-icons-right">
        <input id="ingresos"
          class="input is-success"
          type="text"
          placeholder="ingresos"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="field">
      <label class="label">egresos</label>
      <div class="control has-icons-left has-icons-right">
        <input id="egresos"
          class="input is-success"
          type="text"
          placeholder="egresos"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="field">
      <label class="label">concepto</label>
      <div class="control has-icons-left has-icons-right">
        <input id="concepto"
          class="input is-success"
          type="text"
          placeholder="concepto"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="field">
      <label class="label">valor</label>
      <div class="control has-icons-left has-icons-right">
        <input id="valor"
          class="input is-success"
          type="text"
          placeholder="valor"
          value=""
        />
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
        <span class="icon is-small is-right">
          <i class="fas fa-check"></i>
        </span>
      </div>
      <p class="help is-success"></p>
    </div>

    <div class="select is-multiple">
      <select multiple size="8">
        <option value="ventas">ventas</option>
        <option value="fecha">fecha</option>
        <option value="ingresos">ingresos</option>
        <option value="egresos">egresos</option>
        <option value="concepto">concepto</option>
        <option value="valor">valor</option>
      </select>
    </div>

    <div class="field is-grouped">
      <div class="control">
        <button class="button is-link">guardar</button>
      </div>
      <div class="control">
        <a class="button is-link is-light" type="button" href="../index.html"
          >volver al inicio</a
        >
      </div>
    </div>
    <script src="../js/contabilidad.js"></script>
  </body>
</html>
