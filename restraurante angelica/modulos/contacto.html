<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="usuarios.css">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<section class="section">
  <div class="container">
    <h1 class="title has-text-centered">formulario de contacto</h1>
  </div>
</section>


<div class="field">
  <label class="label">usuarios</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="text" placeholder="usuarios" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="field">
  <label class="label">correo</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="tu correo electronico" placeholder="tu correo electronico" value="tu correo electronico">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
  <p class="help is-danger"></p>
</div>

<div class="field">
  <label class="label">comentario</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="text" placeholder="tu comentario" value="">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
  <p class="help is-success"></p>
</div>

<div class="select is-multiple">
  <select multiple size="8">
    <option value="correo">correo</option>
    <option value="comentario">comentario</option>
  </select>
</div>

<div class="field is-grouped">
  <div class="control">
    <button class="button is-link">guardar</button>
  </div>
  <div class="control">
    <a class="button is-link is-light" type="button" href="../index.html">volver al inicio</a>
  </div>
</div>

</body>
</html>
